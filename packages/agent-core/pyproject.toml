[project]
name = "polaris-agent-core"
version = "0.0.0"
description = "Shared agent contracts and adapters for Polaris."
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.8.0",
  "websockets>=13.0",
]

[project.optional-dependencies]
dev = [
  "ruff>=0.6.0",
  "pytest>=8.0.0"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/polaris_agent_core"]

[tool.ruff]
line-length = 100
target-version = "py312"

