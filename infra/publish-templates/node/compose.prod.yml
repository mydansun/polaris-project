# User-project production compose.
# This file is YOURS to edit; Codex and you own the service list.
#
# Do NOT reference `./.env.polaris.prod` or any relative env_file here —
# the platform injects env_file for you via a sibling `compose.polaris.yml`
# override at publish time (it knows the absolute path to secrets.env on
# the prod host).  Same for traefik labels / external networks: added
# by the platform, not by you.
#
# NOTE: any host-published `ports:` you (or the agent) add to a service
# here will be stripped automatically at publish time — traefik owns the
# host ingress (80/443) so host publishes would collide.

services:
  __POLARIS_SERVICE__:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
    # No ports — traefik reaches the service via the `traefik-public`
    # network attached by the platform override at publish time.
