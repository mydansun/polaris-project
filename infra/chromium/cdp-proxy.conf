# CDP reverse proxy — lets other containers on the docker network reach
# Chromium's DevTools Protocol via http://chromium-vnc:9223.
#
# Two Chromium M111+ hardenings need fixing:
#
#   1. Chromium binds CDP to 127.0.0.1 only and rejects inbound requests
#      whose `Host:` header isn't `localhost` or an IP.  We listen on
#      0.0.0.0:9223 and rewrite the upstream `Host:` to `localhost:9222`.
#
#   2. Chromium's `/json` and `/json/version` responses include its own
#      self-reported `webSocketDebuggerUrl` pointing at
#      `ws://localhost:9222/devtools/...`.  Playwright follows that URL
#      literally, so without a body rewrite it tries to connect to
#      `localhost:9222` on *its own* container — where nothing listens.
#      `sub_filter` rewrites the JSON so Playwright reconnects through us.
#
# WebSocket upgrade preserved so DevTools `/devtools/page/...` sessions
# work; `sub_filter` skips them naturally (no content-length on WS).
server {
    listen 9223;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:9222;
        proxy_set_header Host "localhost:9222";
        proxy_set_header Origin "";
        # Prevent Chromium from gzipping so sub_filter can mutate the body.
        proxy_set_header Accept-Encoding "";

        sub_filter 'localhost:9222' 'chromium-vnc:9223';
        sub_filter_types *;
        sub_filter_once off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
